server:
  port: 9933
spring:
  application:
    name: data-agent
  profiles:
    active: private
  datasource:
    url: jdbc:postgresql://localhost:5432/data_agent_tutorial
    username: postgres
    password: HmSm7WmpPWJtCB66
    driver-class-name: org.postgresql.Driver
  ai:
    openai:
      base-url: https://www.dmxapi.cn
      api-key: sk-oeCrzBvgqCxJU0ZLkqyOR7hStn6WciUAwFHsNXDIwLMzwfwI
      chat:
        options:
          model: deepseek-v4-flash
      embedding:
        options:
          model: Qwen/Qwen3-Embedding-8B
    vectorstore:
      pgvector:
        index-type: NONE               # 4096 dimensions exceed pgvector HNSW index limit; use exact search for this model
        distance-type: cosine_distance # 语义搜索最常用的余弦相似度
        dimensions: 4096               # Qwen3-Embedding-8B 的固定维度
        initialize-schema: true        # Spring AI 自动初始化 vector_store 表

jimmer:
  dialect: org.babyfish.jimmer.sql.dialect.PostgresDialect  # sql方言
  show-sql: true # 是否展示执行的sql
  pretty-sql: true # 是否整理sql 默认展示的为紧凑的sql true则会被整理
  language: kotlin
  client:  # jimmer自动生成客户端api相关配置
    ts:
      path: /ts.zip
    openapi:
      path: /openapi
      ui-path: /openapi-ui

